services:
  postgres:
    image: docker.io/library/postgres:18-alpine
    container_name: miku-postgres
    environment:
      POSTGRES_USER: miku
      POSTGRES_PASSWORD: miku
      POSTGRES_DB: miku
    # The host port is only for the service experiment script and local
    # inspection. Miku still reaches Postgres over the compose network.
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      # PG18+ images expect the mount at /var/lib/postgresql (data lands in a
      # major-version subdir), not the old /var/lib/postgresql/data.
      - miku-pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U miku -d miku"]
      interval: 3s
      timeout: 3s
      retries: 10

  valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: miku-valkey
    command: ["valkey-server", "--appendonly", "yes"]
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - miku-valkeydata:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  miku:
    build:
      context: .
      dockerfile: Containerfile
    container_name: miku-app
    # Run as the host user (rootless podman keep-id) so the app can write the
    # bind-mounted miku_docs/ files while they stay owned by you on the host. The
    # wiki is filesystem-owned: you edit the same .md files from host or browser.
    # MIKU_UID/MIKU_GID default to 1000 (typical Linux); on macOS set them to
    # your host ids (`id -u`/`id -g`, usually 501). `keep-id` is podman-only —
    # with Docker Desktop, remove the userns_mode line (its VM maps ownership).
    userns_mode: keep-id
    user: "${MIKU_UID:-1000}:${MIKU_GID:-1000}"
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      # Host is the compose service name, not localhost.
      MIKU_INDEX_BACKEND: postgres-valkey
      DATABASE_URL: postgres://miku:miku@postgres:5432/miku
      VALKEY_URL: redis://valkey:6379
      MIKU_VALKEY_NAMESPACE: miku
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      # Markdown is the source of truth; bind-mount so browser edits persist to
      # the host and the background watcher reindexes them.
      - ./miku_docs:/app/miku_docs

volumes:
  miku-pgdata:
  miku-valkeydata:
