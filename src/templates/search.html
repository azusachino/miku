{% extends "base.html" %}

{% block title %}
Miku Note - Search
{% endblock %}

{% block content %}
<main class="max-w-[760px] mx-auto px-6 py-10 md:py-16">
    <h1 class="font-display font-bold text-3xl tracking-tight mb-2">Search content</h1>
    <p class="text-sm text-muted/80 mb-8 font-medium">Search the Markdown source directly. Results show matching files and lines.</p>
    <form method="get" action="/search" class="mb-10 max-w-xl" data-content-search>
        <div class="flex gap-3">
            <div class="relative flex-1">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-muted/60 text-lg" aria-hidden="true">⌕</span>
                <input type="search" name="q" value="{{ query | default('') }}" placeholder="Search Markdown content..." class="w-full bg-panel/30 border border-border/25 rounded-xl pl-10 pr-4 py-2.75 text-sm font-semibold text-text-base placeholder:text-muted/40 focus:outline-none focus:border-teal/50 transition" data-content-search-input autofocus>
            </div>
            <button type="submit" class="mk-btn mk-btn-primary px-6">Search</button>
        </div>
        <label class="inline-flex items-center gap-2 mt-3 text-xs text-muted font-semibold">
            <input type="checkbox" name="regex" value="true" data-content-search-regex>
            Regular expression
        </label>
    </form>
    <div class="flex flex-col gap-4" data-content-search-results></div>
    <div class="mk-infinite-sentinel mt-8" data-content-search-sentinel role="status" aria-live="polite"></div>
</main>
{% endblock %}
