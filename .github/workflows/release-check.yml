name: Release check

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v25
      - run: make check
      - run: make featured
      - name: Inspect publishable packages
        run: make release
      - name: Verify private crates are not publishable
        run: |
          test "$(nix develop --command cargo metadata --no-deps --format-version 1 | jq -r '.packages[] | select(.name == "miku-app") | .publish')" = "false"
