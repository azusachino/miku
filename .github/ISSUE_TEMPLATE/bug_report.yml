name: Bug report
description: Report a reproducible problem in Miku Note
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please remove private note content, credentials, and personal data before posting.
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the expected and observed behavior.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      description: Include the route, input, and smallest useful reproduction.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v0.0.2 or abc1234
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, backend profile, and relevant configuration.
    validations:
      required: true
