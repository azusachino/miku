name: Feature request
description: Suggest an improvement to Miku Note
title: "feat: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: Tell us about the workflow or friction behind the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
      description: Describe the smallest useful behavior, including any Markdown or route compatibility requirements.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What do you do today, and what trade-offs matter?
